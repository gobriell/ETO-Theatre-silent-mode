<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Режим «Чистое искусство»</title>
    <style>
        :root {
            --bg-color: #121212;
            --text-color: #ffffff;
            --accent-color: #c5a059; /* Театральное золото */
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            text-align: center;
            padding: 20px;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 90vh;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 10px;
            color: var(--accent-color);
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 10px;
            font-weight: 600;
        }

        p {
            font-size: 1rem;
            line-height: 1.5;
            color: #aaaaaa;
            margin-bottom: 30px;
        }

        .btn {
            display: inline-block;
            background-color: var(--accent-color);
            color: #000000;
            text-decoration: none;
            padding: 15px 40px;
            border-radius: 30px;
            font-size: 1.2rem;
            font-weight: bold;
            box-shadow: 0 4px 15px rgba(197, 160, 89, 0.3);
            transition: transform 0.2s;
            border: none;
            cursor: pointer;
            width: 80%;
        }

        .btn:active {
            transform: scale(0.98);
        }

        /* Стильное окно для всех смартфонов */
        .modal {
            display: none;
            position: fixed;
            z-index: 9999;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.9);
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background-color: #1a1a1a;
            color: #fff;
            padding: 30px;
            border-radius: 20px;
            width: 85%;
            max-width: 340px;
            text-align: center;
            border: 2px solid var(--accent-color);
        }

        .modal h2 {
            color: var(--accent-color);
            margin-top: 0;
            font-size: 22px;
        }

        .modal p {
            font-size: 18px;
            line-height: 1.6;
            color: #ffffff;
            margin: 20px 0;
        }

        .highlight {
            background-color: var(--accent-color);
            color: #000000;
            padding: 4px 10px;
            border-radius: 8px;
            font-weight: bold;
            display: inline-block;
            margin: 5px 0;
        }

        .close-btn {
            background-color: var(--accent-color);
            color: #000000;
            border: none;
            padding: 12px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 10px;
            cursor: pointer;
            width: 100%;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="icon">🎭</div>
        <h1>Режим «Чистое искусство»</h1>
        <p>Добро пожаловать в театр! Нажмите кнопку ниже, чтобы подготовить ваш телефон к просмотру спектакля.</p>

        <button class="btn" onclick="openHelp()">Включить режим «Театр»</button>
    </div>

    <div id="helpModal" class="modal">
        <div class="modal-content">
            <h2>Уважаемый зритель!</h2>
            <p>
                Пожалуйста, нажмите на телефоне<br>
                <span class="highlight">боковую кнопку уменьшения звука</span><br>
                до упора вниз или переведите переключатель в беззвучный режим.
            </p>
            <button class="close-btn" onclick="closeHelp()">Я выключил звук</button>
        </div>
    </div>

    <script>
        function openHelp() {
            document.getElementById('helpModal').style.display = 'flex';
        }

        function closeHelp() {
            document.getElementById('helpModal').style.display = 'none';
        }
    </script>

</body>
</html>
